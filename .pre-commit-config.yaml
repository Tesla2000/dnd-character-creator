repos:
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.3
    hooks:
      - id: autoflake
        args: [ --remove-all-unused-imports, --in-place ]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
      - id: ruff
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [ --py312-plus ]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--exclude-files, '^(README\.md|alembic/.*)$', --baseline, .secrets.baseline]
  - repo: https://github.com/Tesla2000/vulture
    rev: v0.0.4
    hooks:
      - id: vulture
        args:
          [
            ".",
            "--exclude",
            ".venv,venv,tests,.claude",
            "--ignore-attributes-for-classes=.*",
            "--ignore-decorators=@app*,@pytest.fixture,@property,@model_validator*,@field_serializer*,@field_validator*,@model_serializer*,@_cf",
            "--ignore-names=Meta,__dict__,cli_cmd,truncate_to,delete_chain,list_chains,chain_exists,handler",
             "--extra-sys-path=.venv/lib/python3.12/site-packages,.",
          ]
        stages: [ pre-commit ]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        exclude: ^(tests/|scripts/|main\.py)
        additional_dependencies:
          - pydantic>=2.8.2
          - pydantic-settings>=2.13.0
          - frozendict
          - types-requests
          - subclass-getter
          - PyPDF2
          - uvicorn
          - mangum
          - pytest
          - fastapi
          - starlette
          - langchain-openai
          - typing_protocol_intersection
          - structured_output_creator
          - pydantic_frozendict
        args: [ --strict, --config-file, pyproject.toml ]
  - repo: https://github.com/Tesla2000/any-hook
    rev: v3.18.0
    hooks:
      - id: any-hook
        language_version: python3.12
        args: [--modifiers, '[{"type": "remove-f-prefix"},{"type": "open-to-path"},{"type": "any-to-object"},{"type": "check-untracked", "directories": ["src","tests"]},{"type":"pydantic-config-to-model-config"},{"type":"local-imports"},{"type":"pydantic-v1-to-v2"},{"type":"str-enum-inheritance"},{"type":"forbidden-functions","forbidden_functions":["hasattr","getattr","print"]},{"type":"utcnow-to-datetime-now"},{"type":"len-as-bool"},{"type": "leaky-mapping-typing"},{"type":"arbitrary-types-allowed-check"},{"type":"instance-of-pydantic-model-detector"},{"type":"comment-detector","patterns":["type:\\s*ignore","mypy:"]}]']
