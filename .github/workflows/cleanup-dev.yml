name: Destroy Development Environment

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1

jobs:
  cleanup-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::472765723468:role/dnd-deployer-development
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false -backend-config="key=dnd/development/terraform.tfstate"

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve -input=false -var="environment=development"
