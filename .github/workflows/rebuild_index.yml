name: Rebuild index

on:
  push:
    paths:
      - "topics/**/*.md"
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild index.md
        run: python scripts/rebuild_index.py

      - name: Commit updated index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild index.md"
          file_pattern: index.md
