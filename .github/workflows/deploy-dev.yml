name: Deploy Development Environment

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::472765723468:role/dnd-deployer-development
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false -backend-config="key=dnd/development/terraform.tfstate"

      - name: Terraform Apply (ECR only)
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var="environment=development" -var="image_tag=development-${{ github.sha }}" -target=aws_ecr_repository.app

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dnd-character-creator-development
          IMAGE_TAG: development-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Terraform Apply (full infrastructure)
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var="environment=development" -var="image_tag=development-${{ github.sha }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Upload frontend to S3
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw frontend_bucket)
          aws s3 sync ../frontend/dist/ s3://$BUCKET/ --delete

      - name: Invalidate CloudFront cache
        working-directory: terraform
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

      - name: Print URLs
        working-directory: terraform
        run: |
          echo "API:      $(terraform output -raw api_url)"
          echo "Frontend: $(terraform output -raw frontend_url)"
