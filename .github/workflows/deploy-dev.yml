name: Deploy Development Environment

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::472765723468:role/dnd-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false -reconfigure -backend-config="key=dnd/development/terraform.tfstate"

      - name: Terraform Apply (provision ECR and infrastructure)
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var="environment=development" -var="image_tag=development-${{ github.sha }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dnd-character-creator-development
          IMAGE_TAG: development-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Print dev API URL
        working-directory: terraform
        run: |
          echo "Dev API URL: $(terraform output -raw api_url)"
