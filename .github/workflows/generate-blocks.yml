name: Regenerate blocks JSON

on:
  push:
    paths:
      - "dnd/character/blueprint/**"
      - "frontend/scripts/generate_blocks.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Regenerate blocks JSON
        run: uv run python3 frontend/scripts/generate_blocks.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate blocks-generated.json and pipeline-meta.json"
          file_pattern: >-
            frontend/src/data/blocks-generated.json
            frontend/src/data/pipeline-meta.json
