services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: projectblueprint-devcontainer
    user: dev
    volumes:
      - ..:/workspace:cached
      - claude-config:/home/dev/.claude
      - ${SSH_AUTH_SOCK}:/ssh-agent
      - ../pyproject.toml:/workspace/pyproject.toml:ro
      - ../.pre-commit-config.yaml:/workspace/.pre-commit-config.yaml:ro
      - ../.claude/settings.json:/workspace/.claude/settings.json:ro
      - ../.claude/settings.local.json:/workspace/.claude/settings.local.json:ro
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    command: sleep infinity

volumes:
  claude-config:
